app:
  name: "星亘 Drama API"
  version: "1.0.0"
  debug: true
  language: "zh" # 系统语言：zh(中文) 或 en(英文)

server:
  port: 5678
  host: "0.0.0.0"
  cors_origins:
    - "http://localhost:3012"
  read_timeout: 600
  write_timeout: 600

database:
  type: "mysql"
  host: "mysql"
  port: 3306
  user: "xinggen"
  password: "xinggen123"
  database: "xinggen_drama"
  charset: "utf8mb4"
  path: "./data/drama_generator.db" # 保留用于 SQLite 兼容和历史数据迁移来源
  max_idle: 10
  max_open: 100

storage:
  type: "local"
  local_path: "./data/storage"
  base_url: "http://localhost:5678/static"

ai:
  default_text_provider: "openai"
  default_image_provider: "openai"
  default_video_provider: "doubao"

auth:
  jwt_secret: "change-me-in-production"
  token_expire_hours: 72
  initial_credits: 100

billing:
  frame_prompt_credits: 10
  image_generation_credits: 5

mq:
  enabled: true
  url: "amqp://<rabbitmq-user>:<rabbitmq-password>@rabbitmq:5672/"
  queue_prefix: "xinggen"
  consumer_enabled: true
  consumer_concurrency: 4
  prefetch_count: 8
